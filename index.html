<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>육아 필수 정보 대시보드</title>
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
      /* Pre-React fallback loading UI */
      #root-fallback {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #F9FAFB;
        font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', system-ui, sans-serif;
        padding: 24px;
        text-align: center;
        color: #374151;
      }
      @media (prefers-color-scheme: dark) {
        #root-fallback { background: #000000; color: #F3F4F6; }
      }
      #root-fallback .spinner {
        width: 48px; height: 48px;
        border: 4px solid rgba(255,107,107,0.2);
        border-top-color: #FF6B6B;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 24px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #root-fallback .title { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
      #root-fallback .subtitle { font-size: 14px; opacity: 0.6; }
      #root-fallback .error-msg {
        display: none;
        margin-top: 24px;
        padding: 16px 20px;
        background: #FFF5F0;
        border: 1px solid #FFD0C0;
        border-radius: 16px;
        font-size: 13px;
        line-height: 1.6;
        max-width: 360px;
      }
      @media (prefers-color-scheme: dark) {
        #root-fallback .error-msg { background: #1C1C1E; border-color: #38383A; }
      }
      #root-fallback .retry-btn {
        display: none;
        margin-top: 16px;
        padding: 14px 32px;
        background: #FF6B6B;
        color: white;
        border: none;
        border-radius: 16px;
        font-size: 15px;
        font-weight: 800;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body class="bg-brand-gray-50 font-pretendard transition-colors duration-300">
    <div id="root">
      <!-- Pre-React fallback: shown while JS loads, hidden when React mounts -->
      <div id="root-fallback">
        <div class="spinner"></div>
        <div class="title">ChildInfo</div>
        <div class="subtitle">대시보드를 불러오는 중...</div>
        <div class="error-msg" id="load-error">
          앱을 불러오는 중 오류가 발생했습니다.<br>
          Safari를 최신 버전으로 업데이트하거나,<br>
          인터넷 연결을 확인한 후 다시 시도해 주세요.
        </div>
        <button class="retry-btn" id="retry-btn" onclick="window.location.reload()">
          다시 시도
        </button>
      </div>
    </div>
    <script>
      // Timeout: React가 10초 내에 마운트되지 않으면 에러 UI 표시
      window.__rootTimeout = setTimeout(function() {
        var el = document.getElementById('root-fallback');
        if (el) {
          var errEl = document.getElementById('load-error');
          var btnEl = document.getElementById('retry-btn');
          var spinEl = el.querySelector('.spinner');
          if (errEl) errEl.style.display = 'block';
          if (btnEl) btnEl.style.display = 'inline-block';
          if (spinEl) spinEl.style.display = 'none';
        }
      }, 10000);
      // Global error handler: JS 크래시 즉시 감지
      window.onerror = function(msg, src, line, col, err) {
        console.error('Global error caught:', msg, src, line, col, err);
        clearTimeout(window.__rootTimeout);
        var el = document.getElementById('root-fallback');
        if (el) {
          var errEl = document.getElementById('load-error');
          var btnEl = document.getElementById('retry-btn');
          var spinEl = el.querySelector('.spinner');
          if (errEl) {
            errEl.style.display = 'block';
            errEl.innerHTML = '앱 로딩 중 오류가 발생했습니다.<br>페이지를 새로고침해 주세요.<br><small style="opacity:0.5;word-break:break-all">' + (msg || 'Unknown Error') + '</small>';
          }
          if (btnEl) btnEl.style.display = 'inline-block';
          if (spinEl) spinEl.style.display = 'none';
        }
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
